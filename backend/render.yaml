services:
  - type: web
    name: compensey-backend
    runtime: python
    buildCommand: pip install -r requirements-simple.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.9.0
